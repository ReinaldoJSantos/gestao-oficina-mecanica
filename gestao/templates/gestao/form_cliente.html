{% extends 'gestao/base.html' %}

{% block content %}
<div class="container my-4">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">{% if cliente %}Editar{% else %}Novo{% endif %} Cliente</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" value="{{ cliente.nome|default:'' }}" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">CPF</label>
                        <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" value="{{ cliente.cpf|default:'' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" name="telefone" class="form-control" placeholder="(00) 00000-0000" value="{{ cliente.telefone|default:'' }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" value="{{ cliente.email|default:'' }}" required>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success px-5">Salvar Cliente</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
